name: Daily Price Sync

on:
  schedule:
    # 平日 09:00 UTC（日本時間 18:00）に実行
    # 当日終値データ反映（17:00以降目安）を待ってから取得する
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      from:
        description: '株価取得開始日 (YYYY-MM-DD)。省略時は当日/JST'
        required: false
      to:
        description: '株価取得終了日 (YYYY-MM-DD)。省略時は当日/JST'
        required: false

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: 全銘柄 株価同期
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SYNC_FROM:       ${{ inputs.from }}
          SYNC_TO:         ${{ inputs.to }}
        run: npx tsx scripts/daily-prices-sync.ts
