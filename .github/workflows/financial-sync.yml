name: Financial Data Sync

on:
  schedule:
    # 毎週日曜 09:30 UTC（日本時間 18:30）に実行
    - cron: '30 9 * * 0'
  workflow_dispatch:
    inputs:
      shard:
        description: 'シャード番号（0始まり）'
        required: false
        default: '0'
      shards:
        description: '総シャード数'
        required: false
        default: '1'
      sleep_ms:
        description: '銘柄ごとの待機ms'
        required: false
        default: '1000'
      retry_per_code:
        description: '銘柄ごとのリトライ回数'
        required: false
        default: '2'
      rate_limit_per_min:
        description: '契約プラン上限 req/min（Light=60）'
        required: false
        default: '60'
      include_details:
        description: 'fins_details も同期するか (true/false)'
        required: false
        default: 'true'
      edinet_fallback_on_403:
        description: 'fins/details 403後にEDINET補完へ切替 (true/false)'
        required: false
        default: 'true'

jobs:
  sync-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: financial_summary / fins_details 同期
        id: sync
        shell: bash
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          EDINETDB_API_KEY: ${{ secrets.EDINETDB_API_KEY }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          SHARD:           ${{ inputs.shard }}
          SHARDS:          ${{ inputs.shards }}
          SLEEP_MS:        ${{ inputs.sleep_ms }}
          RETRY_PER_CODE:  ${{ inputs.retry_per_code }}
          RATE_LIMIT_PER_MIN: ${{ inputs.rate_limit_per_min }}
          INCLUDE_DETAILS: ${{ inputs.include_details }}
          EDINET_FALLBACK_ON_403: ${{ inputs.edinet_fallback_on_403 }}
        run: |
          set +e
          set -o pipefail
          npx tsx scripts/backfill-financials.ts 2>&1 | tee sync.log
          exit_code=${PIPESTATUS[0]}
          if grep -Eq '(^|[^0-9])429([^0-9]|$)|Too Many Requests' sync.log; then
            rate_limited=true
          else
            rate_limited=false
          fi
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "rate_limited=$rate_limited" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Discord notify
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USERNAME: jquants-metrics
          JOB_STATUS: ${{ steps.sync.outputs.exit_code == '0' && 'success' || 'failure' }}
          RATE_LIMITED: ${{ steps.sync.outputs.rate_limited }}
        run: node scripts/notify-discord.mjs

      - name: Fail if sync failed
        if: ${{ steps.sync.outputs.exit_code != '0' }}
        run: exit 1
