name: Backfill Financials

on:
  schedule:
    # 毎月1日 13:00 UTC（日本時間 22:00）に全銘柄をメンテナンス同期
    - cron: '0 13 1 * *'
  workflow_dispatch:
    inputs:
      shard:
        description: 'シャード番号（0始まり）'
        required: false
        default: '0'
      shards:
        description: '総シャード数（例: 4）'
        required: false
        default: '1'
      sleep_ms:
        description: '銘柄ごとの待機ms'
        required: false
        default: '1000'
      retry_per_code:
        description: '銘柄ごとのリトライ回数'
        required: false
        default: '2'
      rate_limit_per_min:
        description: '契約プラン上限 req/min（Light=60）'
        required: false
        default: '60'
      include_details:
        description: 'fins_details も同期するか (true/false)'
        required: false
        default: 'true'

jobs:
  backfill-financials-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: financial_summary / fins_details バックフィル
        id: sync
        shell: bash
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SHARD:           ${{ inputs.shard }}
          SHARDS:          ${{ inputs.shards }}
          SLEEP_MS:        ${{ inputs.sleep_ms }}
          RETRY_PER_CODE:  ${{ inputs.retry_per_code }}
          RATE_LIMIT_PER_MIN: ${{ inputs.rate_limit_per_min }}
          INCLUDE_DETAILS: ${{ inputs.include_details }}
        run: |
          set +e
          set -o pipefail
          npx tsx scripts/backfill-financials.ts 2>&1 | tee sync.log
          exit_code=${PIPESTATUS[0]}
          if grep -Eq '(^|[^0-9])429([^0-9]|$)|Too Many Requests' sync.log; then
            rate_limited=true
          else
            rate_limited=false
          fi
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "rate_limited=$rate_limited" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Discord notify
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USERNAME: jquants-metrics
          JOB_STATUS: ${{ steps.sync.outputs.exit_code == '0' && 'success' || 'failure' }}
          RATE_LIMITED: ${{ steps.sync.outputs.rate_limited }}
        run: node scripts/notify-discord.mjs

      - name: Fail if sync failed
        if: ${{ steps.sync.outputs.exit_code != '0' }}
        run: exit 1

  backfill-financials-scheduled:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: financial_summary / fins_details メンテナンス同期（定期）
        id: sync
        shell: bash
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          SHARD:           '0'
          SHARDS:          '1'
          SLEEP_MS:        '1000'
          RETRY_PER_CODE:  '2'
          RATE_LIMIT_PER_MIN: '60'
          INCLUDE_DETAILS: 'true'
        run: |
          set +e
          set -o pipefail
          npx tsx scripts/backfill-financials.ts 2>&1 | tee sync.log
          exit_code=${PIPESTATUS[0]}
          if grep -Eq '(^|[^0-9])429([^0-9]|$)|Too Many Requests' sync.log; then
            rate_limited=true
          else
            rate_limited=false
          fi
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "rate_limited=$rate_limited" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Discord notify
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USERNAME: jquants-metrics
          JOB_STATUS: ${{ steps.sync.outputs.exit_code == '0' && 'success' || 'failure' }}
          RATE_LIMITED: ${{ steps.sync.outputs.rate_limited }}
        run: node scripts/notify-discord.mjs

      - name: Fail if sync failed
        if: ${{ steps.sync.outputs.exit_code != '0' }}
        run: exit 1
